<!DOCTYPE html>
<html>
<head>
<title>AI Korean Tutor</title>
</head>

<body style="background:#0f172a;color:white;font-family:Arial;text-align:center;">

<h1>AI Korean Tutor</h1>

<div id="result"></div>

<input id="word" placeholder="Type word">
<button onclick="translateWord()">Send</button>

<script>

const words = {
"hello":"안녕하세요",
"thank you":"감사합니다",
"apple":"사과",
"school":"학교",
"friend":"친구"
};

function translateWord(){

let input = document.getElementById("word").value.toLowerCase();

if(words[input]){
document.getElementById("result").innerHTML =
"You typed: " + input + "<br>Korean: " + words[input];
}
else{
document.getElementById("result").innerHTML =
"Word not found";
}

}

</script>

</body>
</html>
